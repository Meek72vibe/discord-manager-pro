name: Bug Report 🐛
description: File a bug report for Sentinel v5
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: input
    id: tool-issue
    attributes:
      label: Affected Tool (if any)
      description: e.g. mass_ban, create_channel
    validations:
      required: false
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide exactly how to reproduce the issue.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
    validations:
      required: true
